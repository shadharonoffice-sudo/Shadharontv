<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Shadharon TV | Ultimate Cinematic</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Cinzel:wght@900&family=Oswald:wght@300&display=swap');

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            background: #000;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
            perspective: 2000px;
        }

        .bg-glow {
            position: absolute;
            width: 100%; height: 100%;
            background: radial-gradient(circle at center, #300 0%, #000 80%);
            z-index: 1;
        }

        canvas {
            position: absolute;
            top: 0; left: 0;
            z-index: 2;
            pointer-events: none;
        }

        .stage {
            position: relative;
            z-index: 10;
            text-align: center;
            animation: emerge 4s cubic-bezier(0.1, 0.9, 0.2, 1);
        }

        .logo-box {
            width: 250px; height: 250px;
            margin: 0 auto 40px;
            border-radius: 50%;
            /* ইমেজের নাম ঠিক করা হয়েছে */
            background: url('l.jpg.jpg ') center/contain no-repeat; 
            border: 2px solid rgba(255, 215, 0, 0.3);
            box-shadow: 0 0 100px rgba(255, 0, 0, 0.7), inset 0 0 50px rgba(255, 215, 0, 0.3);
            animation: pulse3d 4s infinite alternate ease-in-out;
        }

        .brand-text {
            font-family: 'Cinzel', serif;
            font-size: 7rem; /* স্ক্রিন ফিট করার জন্য একটু ছোট করা হয়েছে */
            font-weight: 900;
            text-transform: uppercase;
            background: linear-gradient(180deg, #fff 10%, #ffd700 40%, #ff0000 80%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            filter: drop-shadow(0 0 30px rgba(255, 0, 0, 0.8));
            letter-spacing: -2px;
            margin: 0;
        }

        .tagline {
            font-family: 'Oswald', sans-serif;
            color: #ffd700;
            font-size: 1.8rem;
            letter-spacing: 20px;
            text-transform: uppercase;
            margin-top: -10px;
            text-shadow: 0 0 20px gold;
            opacity: 0;
            animation: slideUp 2s forwards 2s;
        }

        @keyframes emerge {
            0% { transform: scale(5); filter: blur(50px); opacity: 0; }
            100% { transform: scale(1); filter: blur(0); opacity: 1; }
        }

        @keyframes pulse3d {
            0% { transform: scale(1) rotateY(-15deg); }
            100% { transform: scale(1.1) rotateY(15deg); }
        }

        @keyframes slideUp {
            from { transform: translateY(50px); opacity: 0; }
            to { transform: translateY(0); opacity: 1; }
        }

        .fade-out {
            opacity: 0;
            transform: scale(1.5);
            filter: blur(100px);
            transition: 2s ease-in-out;
        }
    </style>
</head>
<body>

    <div class="bg-glow"></div>
    <canvas id="fireworks"></canvas>

    <div class="stage" id="mainContainer">
        <div class="logo-box"></div>
        <h1 class="brand-text">SHADHARON TV</h1>
        <p class="tagline">গানে গানে সেরা</p>
    </div>

    <script>
        const canvas = document.getElementById('fireworks');
        const ctx = canvas.getContext('2d');
        let particles = [];

        function resize() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
        }
        window.addEventListener('resize', resize);
        resize();

        class Particle {
            constructor() { this.reset(); }
            reset() {
                this.x = canvas.width / 2;
                this.y = canvas.height / 2;
                this.vx = (Math.random() - 0.5) * 8;
                this.vy = (Math.random() - 0.5) * 8;
                this.size = Math.random() * 2 + 1;
                this.life = 1;
                this.decay = Math.random() * 0.01 + 0.005;
                this.color = Math.random() > 0.5 ? '#ffd700' : '#ff0000';
            }
            update() {
                this.x += this.vx;
                this.y += this.vy;
                this.life -= this.decay;
                if (this.life <= 0) this.reset();
            }
            draw() {
                ctx.globalAlpha = this.life;
                ctx.fillStyle = this.color;
                ctx.beginPath();
                ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
                ctx.fill();
            }
        }

        for (let i = 0; i < 100; i++) particles.push(new Particle());

        function animate() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            particles.forEach(p => { p.update(); p.draw(); });
            requestAnimationFrame(animate);
        }
        animate();

        // ৫ সেকেন্ড পর ট্রানজিশন শুরু হবে
        setTimeout(() => {
            const stage = document.getElementById('mainContainer');
            stage.classList.add('fade-out');
            
            setTimeout(() => {
                // খুব গুরুত্বপূর্ণ: এখানে আপনার মেইন সাইটের ফাইলের নাম দিন। 
                // যদি মেইন সাইট 'home.php' হয় তবে সেটাই লিখুন। 
                // ভুলেও 'index.html' লিখবেন না যদি এই ফাইলের নামও 'index.html' হয়।
                // window.location.href = 'home.php'; 
                console.log("Redirecting to main site...");
            }, 2000);
        }, 5000);
    </script>
</body>
</html>
