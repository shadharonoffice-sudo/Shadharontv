<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Shadharon TV - Full Screen Live</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;900&display=swap" rel="stylesheet">
    <style>
        :root { --neon-red: #ff003c; }
        
        /* Pura screen-ke kalo rakha ebong scroll bondho kora */
        body, html { 
            margin: 0; padding: 0; width: 100%; height: 100%; 
            background: #000; overflow: hidden; font-family: 'Segoe UI', sans-serif; 
        }

        /* Header ke patla kora jate video beshi jayga pay */
        header { 
            position: absolute; top: 0; width: 100%; z-index: 100;
            background: rgba(0,0,0,0.6); backdrop-filter: blur(5px);
            padding: 10px 20px; display: flex; justify-content: space-between; align-items: center;
            border-bottom: 1px solid rgba(255, 0, 60, 0.3);
        }

        .logo { font-family: 'Orbitron'; color: var(--neon-red); font-size: 1.2rem; text-shadow: 0 0 10px var(--neon-red); }
        .admin-trigger { width: 20px; height: 20px; cursor: pointer; opacity: 0.1; }

        /* Full Screen TV Player Container */
        .tv-frame { 
            width: 100vw; height: 100vh; 
            display: flex; justify-content: center; align-items: center; 
            background: #000;
        }

        iframe { width: 100%; height: 100%; border: none; }

        /* Sound Overlay (User prothome dekhbe) */
        .overlay { 
            position: absolute; top: 0; left: 0; width: 100%; height: 100%; 
            background: rgba(0,0,0,0.9); z-index: 1000; 
            display: flex; flex-direction: column; justify-content: center; align-items: center; 
        }
        .play-btn { 
            padding: 20px 40px; background: var(--neon-red); color: #fff; 
            font-family: 'Orbitron'; border-radius: 50px; font-weight: bold; 
            cursor: pointer; box-shadow: 0 0 30px var(--neon-red); border: none;
        }

        /* Ticker ke niche bosiye dewa */
        .ticker { 
            position: absolute; bottom: 0; width: 100%; 
            background: rgba(255, 0, 60, 0.8); color: #000; 
            font-weight: bold; padding: 5px 0; font-size: 0.9rem; z-index: 100;
        }
    </style>
</head>
<body>

<header>
    <div class="logo">SHADHARON TV</div>
    <div class="admin-trigger" onclick="adminAccess()"></div>
</header>

<div class="tv-frame">
    <div id="overlay" class="overlay" onclick="startBroadcast()">
        <button class="play-btn">START BROADCAST</button>
        <p style="color: #666; margin-top: 20px; font-size: 0.8rem;">Click to enable HD Sound & Video</p>
    </div>
    <div id="player" style="width: 100%; height: 100%;"></div>
</div>

<div class="ticker"><marquee scrollamount="7">••• SHADHARON TV: Chairman Akash Joarder ••• Live from Dhaka ••• Digital High Definition Portal •••</marquee></div>

<script>
    let savedID = localStorage.getItem('stv_master_id') || "";
    const PASS = "12332";

    function adminAccess() {
        let p = prompt("Security PIN:");
        if(p === PASS) {
            let link = prompt("Paste YouTube Playlist Link:");
            if(link && link.includes('list=')) {
                let id = link.split('list=')[1].split('&')[0];
                localStorage.setItem('stv_master_id', id);
                location.reload();
            } else { alert("Invalid Link!"); }
        }
    }

    function startBroadcast() {
        document.getElementById('overlay').style.display = 'none';
        if(savedID) {
            // Full Screen Iframe Load
            document.getElementById('player').innerHTML = `
                <iframe src="https://www.youtube.com/embed?listType=playlist&list=${savedID}&autoplay=1&mute=0&rel=0&controls=1&showinfo=0" 
                allow="autoplay; encrypted-media" allowfullscreen></iframe>
            `;
        } else {
            alert("Please set a playlist link first (Secret Button on Top Right)");
        }
    }

    // Page load holei player ready thakbe kintu mute thakbe browser policy-r jonno
    window.onload = () => {
        if(savedID) {
            document.getElementById('player').innerHTML = `
                <iframe src="https://www.youtube.com/embed?listType=playlist&list=${savedID}&autoplay=1&mute=1&rel=0&controls=0" 
                allow="autoplay; encrypted-media" allowfullscreen></iframe>
            `;
        }
    };
</script>

</body>
</html>
