<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Shadharon TV - Persistent Portal</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;900&display=swap" rel="stylesheet">
    <style>
        :root { --neon-red: #ff003c; --bg: #050505; }
        body { margin: 0; background: var(--bg); color: #fff; font-family: 'Segoe UI', sans-serif; overflow: hidden; }

        header {
            padding: 15px 30px; background: #000; border-bottom: 2px solid var(--neon-red);
            display: flex; justify-content: space-between; align-items: center;
            box-shadow: 0 0 15px rgba(255, 0, 60, 0.3);
        }

        .logo { font-family: 'Orbitron'; color: var(--neon-red); font-size: 1.5rem; text-shadow: 0 0 10px var(--neon-red); }

        .secret-dot { width: 12px; height: 12px; background: #111; border-radius: 50%; cursor: pointer; }
        .secret-dot:hover { background: var(--neon-red); }

        .admin-section { background: #111; padding: 15px; border-bottom: 1px solid #222; display: flex; justify-content: center; gap: 10px; }
        .hidden { display: none !important; }

        input { background: #000; border: 1px solid #333; color: #fff; padding: 10px; border-radius: 5px; outline: none; }
        .btn-red { padding: 10px 20px; background: var(--neon-red); color: #fff; border: none; border-radius: 5px; cursor: pointer; font-weight: bold; }

        .main-grid { display: grid; grid-template-columns: 1fr 350px; height: calc(100vh - 145px); }
        .video-box { padding: 20px; text-align: center; }
        .iframe-wrap { width: 100%; aspect-ratio: 16/9; border: 1px solid var(--neon-red); border-radius: 10px; overflow: hidden; background: #000; }

        .playlist { background: #0a0a0a; padding: 20px; overflow-y: auto; border-left: 1px solid #222; }
        .item { display: flex; gap: 10px; padding: 10px; background: rgba(255,255,255,0.03); border-radius: 8px; margin-bottom: 10px; cursor: pointer; border: 1px solid transparent; position: relative; }
        .item.active { border-color: var(--neon-red); background: rgba(255,0,60,0.1); }
        .item img { width: 100px; border-radius: 4px; }
        
        .delete-btn { position: absolute; right: 5px; top: 5px; color: #ff003c; font-size: 12px; cursor: pointer; display: none; }
        .item:hover .delete-btn { display: block; }

        .ticker { position: fixed; bottom: 0; width: 100%; background: var(--neon-red); color: #000; font-weight: bold; padding: 5px 0; }
    </style>
</head>
<body>

    <header>
        <div class="logo">SHADHARON TV</div>
        <div style="font-size: 0.8rem; color: #444; display: flex; align-items: center; gap: 10px;">
            <span>Dhaka HD</span>
            <div class="secret-dot" onclick="showLogin()"></div>
        </div>
    </header>

    <div id="loginPanel" class="admin-section hidden">
        <input type="password" id="passInput" placeholder="Pin Code">
        <button class="btn-red" onclick="verifyAdmin()">UNLOCK</button>
    </div>

    <div id="videoPanel" class="admin-section hidden">
        <input type="text" id="ytLink" style="width: 350px;" placeholder="Paste YouTube Link...">
        <button class="btn-red" onclick="addVideo()">ADD VIDEO</button>
        <button class="btn-red" style="background:#222;" onclick="clearAll()">CLEAR ALL</button>
        <button class="btn-red" style="background:#444;" onclick="logout()">LOCK</button>
    </div>

    <div class="main-grid">
        <div class="video-box">
            <div class="iframe-wrap"><div id="player"></div></div>
            <h2 id="vTitle" style="color: var(--neon-red); margin-top: 15px;">Broadcast Console</h2>
        </div>

        <div class="playlist">
            <h3 style="color: var(--neon-red); font-family: 'Orbitron'; font-size: 0.8rem;">SAVED PLAYLIST</h3>
            <div id="listItems"></div>
        </div>
    </div>

    <div class="ticker"><marquee>SHADHARON TV: Data Auto-Saved Mode Active ••• Chairman Akash Joarder ••• Live From Dhaka</marquee></div>

    <script src="https://www.youtube.com/iframe_api"></script>
    <script>
        let player;
        let videoList = JSON.parse(localStorage.getItem('shadharon_tv_list')) || [];
        let currentIdx = 0;
        const ADMIN_PASS = "12332"; 

        function showLogin() { document.getElementById('loginPanel').classList.toggle('hidden'); }

        function verifyAdmin() {
            if(document.getElementById('passInput').value === ADMIN_PASS) {
                document.getElementById('loginPanel').classList.add('hidden');
                document.getElementById('videoPanel').classList.remove('hidden');
            } else { alert("Wrong Pin!"); }
        }

        function logout() { document.getElementById('videoPanel').classList.add('hidden'); }

        function onYouTubeIframeAPIReady() {
            player = new YT.Player('player', {
                height: '100%', width: '100%',
                playerVars: { 'autoplay': 1, 'mute': 0 },
                events: { 'onReady': onPlayerReady, 'onStateChange': onPlayerStateChange }
            });
        }

        function onPlayerReady() {
            if(videoList.length > 0) playVideo(0);
            renderPlaylist();
        }

        function addVideo() {
            const link = document.getElementById('ytLink').value;
            const videoId = extractId(link);
            if(videoId) {
                videoList.push(videoId);
                saveAndRender();
                document.getElementById('ytLink').value = '';
                if(videoList.length === 1) playVideo(0);
            }
        }

        function extractId(url) {
            const regExp = /^.*(youtu.be\/|v\/|u\/\w\/|embed\/|watch\?v=|\&v=)([^#\&\?]*).*/;
            const match = url.match(regExp);
            return (match && match[2].length === 11) ? match[2] : null;
        }

        function saveAndRender() {
            localStorage.setItem('shadharon_tv_list', JSON.stringify(videoList));
            renderPlaylist();
        }

        function renderPlaylist() {
            const container = document.getElementById('listItems');
            container.innerHTML = '';
            videoList.forEach((id, index) => {
                container.innerHTML += `
                    <div class="item ${index === currentIdx ? 'active' : ''}" onclick="playVideo(${index})">
                        <img src="https://img.youtube.com/vi/${id}/mqdefault.jpg">
                        <span>Video #${index + 1}</span>
                        <div class="delete-btn" onclick="deleteVideo(event, ${index})">✖</div>
                    </div>
                `;
            });
        }

        function deleteVideo(event, index) {
            event.stopPropagation();
            videoList.splice(index, 1);
            saveAndRender();
        }

        function clearAll() {
            if(confirm("Are you sure you want to delete all videos?")) {
                videoList = [];
                saveAndRender();
            }
        }

        function playVideo(index) {
            currentIdx = index;
            player.loadVideoById(videoList[index]);
            document.getElementById('vTitle').innerText = "Streaming: #" + (index + 1);
            renderPlaylist();
        }

        function onPlayerStateChange(event) {
            if (event.data === YT.PlayerState.ENDED) {
                currentIdx++;
                if (currentIdx < videoList.length) playVideo(currentIdx);
                else playVideo(0);
            }
        }
    </script>
</body>
</html>
