<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Shadharon TV - Playlist Portal</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;900&display=swap" rel="stylesheet">
    <style>
        :root { --neon-red: #ff003c; --bg: #050505; }
        body { margin: 0; background: var(--bg); color: #fff; font-family: 'Segoe UI', sans-serif; overflow: hidden; }

        header {
            padding: 15px 30px; background: #000; border-bottom: 2px solid var(--neon-red);
            display: flex; justify-content: space-between; align-items: center;
            box-shadow: 0 0 15px rgba(255, 0, 60, 0.3);
        }

        .logo { font-family: 'Orbitron'; color: var(--neon-red); font-size: 1.5rem; text-shadow: 0 0 10px var(--neon-red); }
        .secret-trigger { width: 12px; height: 12px; background: #111; border-radius: 50%; cursor: pointer; }

        .admin-panel { background: #111; padding: 15px; border-bottom: 1px solid #222; display: flex; justify-content: center; gap: 10px; }
        .hidden { display: none !important; }

        input { background: #000; border: 1px solid #333; color: #fff; padding: 10px; border-radius: 5px; outline: none; width: 400px; }
        .btn-red { padding: 10px 20px; background: var(--neon-red); color: #fff; border: none; border-radius: 5px; cursor: pointer; font-weight: bold; }

        .main-layout { display: flex; flex-direction: column; align-items: center; padding: 20px; height: calc(100vh - 145px); }
        .player-wrapper { width: 90%; max-width: 1000px; aspect-ratio: 16/9; border: 2px solid var(--neon-red); border-radius: 12px; overflow: hidden; background: #000; box-shadow: 0 0 30px rgba(255, 0, 60, 0.2); }
        iframe { width: 100%; height: 100%; border: none; }

        .status-bar { margin-top: 15px; color: var(--neon-red); font-family: 'Orbitron'; font-size: 0.9rem; text-transform: uppercase; }

        .footer-ticker { position: fixed; bottom: 0; width: 100%; background: var(--neon-red); color: #000; font-weight: bold; padding: 6px 0; }
    </style>
</head>
<body>

    <header>
        <div class="logo">SHADHARON TV</div>
        <div style="display: flex; align-items: center; gap: 10px;">
            <span style="font-size: 0.7rem; color: #333;">BROADCAST MODE</span>
            <div class="secret-trigger" onclick="toggleLogin()"></div>
        </div>
    </header>

    <div id="loginSection" class="admin-panel hidden">
        <input type="password" id="pinCode" placeholder="Enter Secret Pin">
        <button class="btn-red" onclick="login()">UNLOCK</button>
    </div>

    <div id="addSection" class="admin-panel hidden">
        <input type="text" id="playlistUrl" placeholder="Paste YouTube Playlist Link Here...">
        <button class="btn-red" onclick="updatePlaylist()">SET PLAYLIST</button>
        <button class="btn-red" style="background:#333;" onclick="lock()">LOCK</button>
    </div>

    <div class="main-layout">
        <div class="player-wrapper" id="playerWrap">
            <div style="display:flex; justify-content:center; align-items:center; height:100%; color:#444;">Please set a Playlist Link from Admin Panel</div>
        </div>
        <div class="status-bar" id="statusText">System Offline</div>
    </div>

    <div class="footer-ticker">
        <marquee>••• SHADHARON TV: Dhaka City's Premier Music Portal ••• Chairman Akash Joarder ••• Auto-Playlist Mode Active •••</marquee>
    </div>

    <script>
        // Saved data load
        let savedPlaylistID = localStorage.getItem('stv_playlist_id') || "";
        const SECRET_PIN = "12332";

        function toggleLogin() { document.getElementById('loginSection').classList.toggle('hidden'); }

        function login() {
            if(document.getElementById('pinCode').value === SECRET_PIN) {
                document.getElementById('loginSection').classList.add('hidden');
                document.getElementById('addSection').classList.remove('hidden');
            } else { alert("Access Denied!"); }
        }

        function lock() { document.getElementById('addSection').classList.add('hidden'); }

        function updatePlaylist() {
            const url = document.getElementById('playlistUrl').value;
            const playlistID = extractPlaylistID(url);
            
            if(playlistID) {
                savedPlaylistID = playlistID;
                localStorage.setItem('stv_playlist_id', playlistID);
                document.getElementById('playlistUrl').value = '';
                loadPlayer(playlistID);
                alert("Playlist Updated Successfully!");
            } else {
                alert("Invalid Playlist Link! Make sure it has 'list=ID' in the URL.");
            }
        }

        function extractPlaylistID(url) {
            const reg = /[&?]list=([^&]+)/;
            const match = url.match(reg);
            return (match && match[1]) ? match[1] : null;
        }

        function loadPlayer(id) {
            if(!id) return;
            // YouTube Official Playlist Embed with Autoplay and Loop
            document.getElementById('playerWrap').innerHTML = `
                <iframe src="https://www.youtube.com/embed?listType=playlist&list=${id}&autoplay=1&loop=1&rel=0" 
                        allow="autoplay; encrypted-media" allowfullscreen></iframe>
            `;
            document.getElementById('statusText').innerText = "Broadcasting Live Playlist";
        }

        // On Page Load
        window.onload = () => {
            if(savedPlaylistID) {
                loadPlayer(savedPlaylistID);
            }
        };
    </script>
</body>
</html>
