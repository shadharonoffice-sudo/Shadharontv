<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>গানে গানে সেরা এশিয়া | Registration Season-3</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Hind+Siliguri:wght@300;500;700&family=Poppins:wght@800&display=swap');

        :root {
            --primary: #ff0055;
            --secondary: #00ffcc;
            --dark: #050505;
            --glass: rgba(255, 255, 255, 0.05);
            --locked: rgba(255, 255, 255, 0.1);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Hind Siliguri', sans-serif;
            background: radial-gradient(circle at top, #1a1a1a, #050505);
            color: white;
            line-height: 1.6;
        }

        .container { max-width: 800px; margin: 50px auto; padding: 20px; }

        .header-box { text-align: center; margin-bottom: 40px; }
        .header-box h1 { font-family: 'Poppins', sans-serif; font-size: 2.5rem; color: var(--secondary); }

        /* Payment First Section */
        .payment-lock-screen {
            background: rgba(255, 0, 85, 0.1);
            border: 2px solid var(--primary);
            padding: 30px;
            border-radius: 25px;
            margin-bottom: 30px;
            text-align: center;
        }

        .reg-card {
            background: var(--glass);
            padding: 40px;
            border-radius: 25px;
            border: 1px solid rgba(255,255,255,0.1);
            opacity: 0.3; /* Initially locked */
            pointer-events: none; /* Disable interaction */
            transition: 0.5s;
        }

        .reg-card.unlocked {
            opacity: 1;
            pointer-events: all;
            border-color: var(--secondary);
        }

        .input-group { margin-bottom: 20px; text-align: left; }
        input, select, textarea {
            width: 100%; padding: 12px;
            background: rgba(255,255,255,0.07);
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 12px; color: white;
        }

        .verify-btn {
            background: var(--secondary);
            color: black;
            padding: 10px 25px;
            border: none;
            border-radius: 50px;
            font-weight: bold;
            cursor: pointer;
            margin-top: 15px;
        }

        .submit-btn {
            width: 100%; padding: 18px;
            background: linear-gradient(45deg, var(--primary), #8000ff);
            border: none; border-radius: 50px; color: white;
            font-size: 1.2rem; font-weight: bold; cursor: pointer;
        }

        .status-msg { margin-top: 10px; font-size: 14px; display: none; }
    </style>
</head>
<body>

<div class="container">
    <div class="header-box">
        <h1>গানে গানে সেরা এশিয়া</h1>
        <p>সিজন-৩ রেজিস্ট্রেশন ফরম</p>
    </div>

    <div class="payment-lock-screen" id="paymentSection">
        <h3 style="color: var(--secondary);">ধাপ ১: পেমেন্ট সম্পন্ন করুন</h3>
        <p>রেজিস্ট্রেশন ফরমটি আনলক করতে প্রথমে ১০০০ টাকা পেমেন্ট করুন।</p>
        <div style="background: #000; padding: 15px; border-radius: 10px; margin: 15px 0;">
            <p>বিকাশ / নগদ (Send Money): <strong>01757331663</strong></p>
        </div>

        <div class="input-group">
            <label>যে নম্বর থেকে টাকা পাঠিয়েছেন:</label>
            <input type="tel" id="pre_sender" placeholder="017XXXXXXXX">
        </div>
        <div class="input-group">
            <label>ট্রানজেকশন আইডি (TrxID):</label>
            <input type="text" id="pre_trx" placeholder="8N77XPS2">
        </div>
        
        <button type="button" class="verify-btn" onclick="verifyPayment()">পেমেন্ট ভেরিফাই করুন</button>
        <p id="error-msg" class="status-msg" style="color: #ff4444;">অনুগ্রহ করে সঠিক তথ্য দিন।</p>
    </div>

    <div class="reg-card" id="formCard">
        <h2 style="color: var(--secondary); margin-bottom: 20px;">ধাপ ২: ব্যক্তিগত তথ্য পূরণ করুন (Unlocked)</h2>
        <form id="megaForm">
            <div class="input-group">
                <label>আপনার পূর্ণ নাম *</label>
                <input type="text" required>
            </div>

            <div class="input-group">
                <label>সচল WhatsApp নম্বর *</label>
                <input type="tel" required>
            </div>

            <div class="input-group">
                <label>NID অথবা জন্ম নিবন্ধন নম্বর *</label>
                <input type="text" required>
            </div>

            <input type="hidden" id="final_sender" name="sender_number">
            <input type="hidden" id="final_trx" name="transaction_id">

            <button type="submit" class="submit-btn">রেজিস্ট্রেশন জমা দিন</button>
        </form>
    </div>

    <div id="success-msg" style="display:none; text-align:center; padding: 50px;">
        <h1 style="color: var(--secondary);">অভিনন্দন!</h1>
        <p>আপনার আবেদনটি গ্রহণ করা হয়েছে।</p>
    </div>
</div>

<script>
    function verifyPayment() {
        const sender = document.getElementById('pre_sender').value;
        const trx = document.getElementById('pre_trx').value;
        const errorMsg = document.getElementById('error-msg');
        const formCard = document.getElementById('formCard');
        const paymentSection = document.getElementById('paymentSection');

        // Logic: পেমেন্ট ফিল্ড খালি থাকলে বা নির্দিষ্ট দৈর্ঘ্যের কম হলে আটকাবে
        if(sender.length < 11 || trx.length < 6) {
            errorMsg.style.display = 'block';
            errorMsg.innerText = "ভুল নম্বর বা TrxID! আবার চেষ্টা করুন।";
        } else {
            // পেমেন্ট তথ্য সঠিক মনে হলে ফরম আনলক হবে
            alert("পেমেন্ট তথ্য যাচাই করা হচ্ছে... ফরমটি এখন আনলক করা হলো।");
            
            paymentSection.style.display = 'none'; // পেমেন্ট সেকশন হাইড হবে
            formCard.classList.add('unlocked'); // ফরম আনলক হবে
            
            // ডাটাগুলো হিডেন ইনপুটে সেট করা যাতে সাবমিট হয়
            document.getElementById('final_sender').value = sender;
            document.getElementById('final_trx').value = trx;

            window.scrollTo(0, formCard.offsetTop - 50);
        }
    }

    document.getElementById('megaForm').addEventListener('submit', function(e) {
        e.preventDefault();
        document.getElementById('formCard').style.display = 'none';
        document.getElementById('success-msg').style.display = 'block';
    });
</script>

</body>
</html>
