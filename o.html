<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>গানে গানে সেরা এশিয়া | সিজন ৩</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Hind+Siliguri:wght@300;500;700&family=Poppins:wght@700&display=swap');
        :root { --primary: #ff0055; --secondary: #00ffcc; }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Hind Siliguri', sans-serif; background: #000; color: #fff; padding: 15px; line-height: 1.6; }
        .container { max-width: 600px; margin: 0 auto; background: rgba(255,255,255,0.05); padding: 25px; border-radius: 20px; border: 1px solid rgba(255,255,255,0.1); }
        .header { text-align: center; margin-bottom: 25px; }
        .header h1 { color: var(--secondary); font-size: 24px; text-transform: uppercase; }
        .section-title { color: var(--primary); font-weight: bold; margin: 20px 0 10px; border-bottom: 2px solid var(--primary); display: inline-block; }
        .input-group { margin-bottom: 15px; }
        label { display: block; margin-bottom: 5px; font-size: 14px; color: #bbb; }
        input, select { width: 100%; padding: 12px; background: rgba(255,255,255,0.08); border: 1px solid #444; border-radius: 10px; color: #fff; font-family: inherit; }
        .payment-box { background: #1a1a1a; border: 1px dashed gold; padding: 15px; border-radius: 12px; text-align: center; margin: 20px 0; }
        .payment-box h2 { color: gold; font-size: 22px; letter-spacing: 2px; }
        .btn { width: 100%; padding: 15px; border: none; border-radius: 50px; font-size: 18px; font-weight: bold; cursor: pointer; transition: 0.3s; margin-top: 10px; text-decoration: none; display: flex; align-items: center; justify-content: center; }
        .btn-submit { background: linear-gradient(45deg, var(--primary), #8000ff); color: white; }
        .btn-wa { background: #25d366; color: white; display: none; }
        #success-msg { display: none; text-align: center; background: rgba(37, 211, 102, 0.1); padding: 20px; border-radius: 15px; margin-top: 20px; }
    </style>
</head>
<body>

<div class="container">
    <div class="header">
        <h1>গানে গানে সেরা এশিয়া</h1>
        <p>অফিসিয়াল রেজিস্ট্রেশন ফরম</p>
    </div>

    <form id="regForm">
        <div class="section-title">ব্যক্তিগত তথ্য</div>
        <div class="input-group"><label>নাম *</label><input type="text" name="name" required></div>
        <div class="input-group"><label>WhatsApp নাম্বার *</label><input type="tel" name="whatsapp" required></div>
        <div class="input-group"><label>বসবাস *</label><select name="residence"><option value="বাংলাদেশ">বাংলাদেশ</option><option value="প্রবাসে">প্রবাসে</option></select></div>
        <div class="input-group"><label>পেশা</label><input type="text" name="job"></div>
        <div class="input-group"><label>জন্ম তারিখ *</label><input type="date" name="dob" required></div>
        <div class="input-group"><label>লিঙ্গ *</label>
            <div style="display: flex; gap: 20px; padding-top: 5px;">
                <label><input type="radio" name="gender" value="পুরুষ" checked> পুরুষ</label>
                <label><input type="radio" name="gender" value="নারী"> নারী</label>
            </div>
        </div>

        <div class="section-title">ঠিকানা</div>
        <div class="input-group"><label>জেলা *</label><input type="text" name="district" required></div>
        <div class="input-group"><label>গ্রাম/মহল্লা *</label><input type="text" name="village" required></div>

        <div class="section-title">পেমেন্ট</div>
        <div class="payment-box">
            <p style="font-size: 14px;">রেজিস্ট্রেশন ফি: ১০০০ টাকা (Send Money)</p>
            <h2>০১৭৫৭৩৩১৬৬৩</h2>
            <p style="font-size: 12px; color: gold;">বিকাশ / নগদ / রকেট</p>
        </div>
        <div class="input-group"><label>ট্রানজেকশন আইডি (TrxID) *</label><input type="text" name="trx_id" required></div>
        <div class="input-group"><label>পেমেন্ট নম্বর (যে নম্বর থেকে টাকা পাঠিয়েছেন) *</label><input type="tel" name="sender_phone" required></div>

        <button type="submit" id="submitBtn" class="btn btn-submit">ফরম জমা দিন</button>
    </form>

    <div id="success-msg">
        <h2 style="color: #25d366;">আবেদন সফল হয়েছে!</h2>
        <p style="margin: 15px 0; font-size: 14px;">আপনার তথ্য সেভ করা হয়েছে। এখন নিচের বাটনে ক্লিক করে হোয়াটসঅ্যাপে গান পাঠিয়ে রেজিস্ট্রেশন সম্পন্ন করুন।</p>
        <a id="waBtn" href="#" target="_blank" class="btn btn-wa" style="display: flex;">WhatsApp-এ গান পাঠান</a>
    </div>
</div>

<script>
    // আপনার জেনারেট করা Web App URL টি এখানে বসান
    const scriptURL = 'https://script.google.com/macros/s/AKfycbxBKFdhWD7zE7oR43c3RlccZQSeYz9nYAFS0LUiXqssMd7GULXSFLOungtg4lPbiywu/exec';
    const form = document.getElementById('regForm');
    const submitBtn = document.getElementById('submitBtn');
    const successMsg = document.getElementById('success-msg');
    const waBtn = document.getElementById('waBtn');

    form.addEventListener('submit', e => {
        e.preventDefault();
        submitBtn.disabled = true;
        submitBtn.innerHTML = "প্রসেসিং হচ্ছে...";

        fetch(scriptURL, { method: 'POST', body: new FormData(form), mode: 'no-cors'})
        .then(() => {
            const formData = new FormData(form);
            const name = formData.get('name');
            const trx = formData.get('trx_id');
            const whatsappMsg = `নতুন রেজিস্ট্রেশন - গানে গানে সেরা এশিয়া\n👤 নাম: ${name}\n🆔 TrxID: ${trx}`;
            
            waBtn.href = `https://wa.me/8801757331663?text=${encodeURIComponent(whatsappMsg)}`;
            form.style.display = "none";
            successMsg.style.display = "block";
            window.scrollTo(0, 0);
        })
        .catch(error => {
            console.error('Error!', error.message);
            // Error আসলেও আমরা সাকসেস দেখাবো কারণ no-cors এ ডাটা চলে যায়
            form.style.display = "none";
            successMsg.style.display = "block";
        });
    });
</script>

</body>
</html>
