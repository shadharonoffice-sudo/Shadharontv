<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>গানে গানে সেরা এশিয়া | Registration Season-3</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Hind+Siliguri:wght@300;500;700&family=Poppins:wght@800&display=swap');

        :root {
            --primary: #ff0055;
            --secondary: #00ffcc;
            --dark: #050505;
            --glass: rgba(255, 255, 255, 0.05);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Hind Siliguri', sans-serif;
            background: radial-gradient(circle at top, #1a1a1a, #050505);
            color: white;
            line-height: 1.6;
        }

        .container { max-width: 800px; margin: 40px auto; padding: 20px; }

        .header-box { text-align: center; margin-bottom: 30px; }
        .header-box h1 { font-family: 'Poppins', sans-serif; font-size: 2.2rem; color: var(--secondary); text-transform: uppercase; }
        
        .reg-card {
            background: var(--glass); backdrop-filter: blur(15px);
            padding: 35px; border-radius: 25px;
            border: 1px solid rgba(255,255,255,0.1);
            box-shadow: 0 20px 40px rgba(0,0,0,0.5);
        }

        .section-title {
            border-left: 4px solid var(--primary);
            padding-left: 15px; margin: 20px 0;
            color: var(--secondary); font-size: 1.2rem;
        }

        .input-group { margin-bottom: 15px; }
        label { display: block; margin-bottom: 8px; color: #ddd; }
        
        input, select {
            width: 100%; padding: 12px;
            background: rgba(255,255,255,0.07);
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 12px; color: white; font-family: 'Hind Siliguri';
        }

        /* Sections hidden by default */
        #payment-section, #whatsapp-section { display: none; animation: fadeIn 0.5s ease; }

        .submit-btn {
            width: 100%; padding: 16px; margin-top: 20px;
            background: linear-gradient(45deg, var(--primary), #8000ff);
            border: none; border-radius: 50px; color: white;
            font-size: 1.1rem; font-weight: bold; cursor: pointer;
            transition: 0.3s;
        }

        .wa-btn { background: #25d366 !important; box-shadow: 0 10px 20px rgba(37, 211, 102, 0.2); }

        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body>

<div class="container">
    <div class="header-box">
        <h1>গানে গানে সেরা এশিয়া</h1>
        <p style="color: #aaa;">Season-3 Registration</p>
    </div>

    <div class="reg-card">
        <div id="step-1">
            <div class="section-title">ব্যক্তিগত তথ্য</div>
            <div class="input-group">
                <label>আপনার পূর্ণ নাম *</label>
                <input type="text" id="user_name" placeholder="নাম লিখুন">
            </div>
            <div class="input-group">
                <label>আপনার হোয়াটসঅ্যাপ নাম্বার *</label>
                <input type="tel" id="user_wa" placeholder="01XXXXXXXXX">
            </div>
            <div class="input-group">
                <label>জেলা *</label>
                <input type="text" id="user_dist" placeholder="জেলার নাম">
            </div>
            <button type="button" onclick="goToPayment()" class="submit-btn">পরবর্তী ধাপ (পেমেন্ট)</button>
        </div>

        <div id="payment-section">
            <div class="section-title">পেমেন্ট মেথড</div>
            <div style="background: rgba(255, 0, 85, 0.1); padding: 20px; border-radius: 15px; border: 1px solid var(--primary); text-align: center; margin-bottom: 20px;">
                <h3 style="color: var(--secondary);">রেজিস্ট্রেশন ফি: ১০০০ টাকা</h3>
                <p>বিকাশ/নগদ (Send Money): <br><strong>01757331663</strong></p>
            </div>
            
            <div class="input-group">
                <label>যে নাম্বার থেকে টাকা পাঠিয়েছেন *</label>
                <input type="tel" id="pay_number" placeholder="০১৮XXXXXXXX">
            </div>
            <div class="input-group">
                <label>ট্রানজেকশন আইডি (TrxID) *</label>
                <input type="text" id="pay_trx" placeholder="8N77XPS2">
            </div>
            <button type="button" onclick="goToWhatsApp()" class="submit-btn">তথ্য নিশ্চিত করুন ও হোয়াটসঅ্যাপে পাঠান</button>
        </div>

        <div id="whatsapp-section">
            <div class="section-title">অনুমোদন ও পারমিশন কার্ড</div>
            <p style="text-align: center; margin-bottom: 20px;">আপনার সকল তথ্য আমাদের কাছে পৌঁছেছে। এখন আমাদের সাথে সরাসরি চ্যাট করে আপনার **পারমিশন কার্ডটি** সংগ্রহ করুন।</p>
            <button type="button" onclick="finalContact()" class="submit-btn wa-btn">অ্যাডমিনের সাথে কথা বলুন</button>
        </div>
    </div>
</div>

<script>
    // টেস্ট করার জন্য আপনার দেওয়া নাম্বার সেট করা হয়েছে
    const testNumber = "8801836723684"; 

    function goToPayment() {
        const name = document.getElementById('user_name').value;
        const wa = document.getElementById('user_wa').value;
        
        if(name === "" || wa === "") {
            alert("অনুগ্রহ করে নাম এবং হোয়াটসঅ্যাপ নাম্বার দিন।");
            return;
        }
        document.getElementById('step-1').style.display = 'none';
        document.getElementById('payment-section').style.display = 'block';
    }

    function goToWhatsApp() {
        const name = document.getElementById('user_name').value;
        const sender = document.getElementById('pay_number').value;
        const trx = document.getElementById('pay_trx').value;
        const dist = document.getElementById('user_dist').value;

        if(sender === "" || trx === "") {
            alert("পেমেন্ট নাম্বার এবং TrxID দিন।");
            return;
        }

        // হোয়াটসঅ্যাপে তথ্য পাঠানোর মেসেজ ফরম্যাট
        const message = `হ্যালো অ্যাডমিন,\nআমি রেজিস্ট্রেশন তথ্য জমা দিয়েছি।\n\n👤 নাম: ${name}\n🏡 জেলা: ${dist}\n💰 পেমেন্ট নাম্বার: ${sender}\n🆔 TrxID: ${trx}\n\nদয়া করে চেক করে আমাকে অনুমতি দিন।`;
        
        window.open(`https://wa.me/${testNumber}?text=${encodeURIComponent(message)}`, '_blank');

        document.getElementById('payment-section').style.display = 'none';
        document.getElementById('whatsapp-section').style.display = 'block';
    }

    function finalContact() {
        const message = "হ্যালো, আমি আমার পারমিশন কার্ডটি সংগ্রহ করতে চাই। আমার পেমেন্ট তথ্য আগেই পাঠিয়েছি।";
        window.open(`https://wa.me/${testNumber}?text=${encodeURIComponent(message)}`, '_blank');
    }
</script>

</body>
</html>
