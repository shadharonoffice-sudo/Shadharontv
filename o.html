<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>গানে গানে সেরা এশিয়া | Secure Registration</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Hind+Siliguri:wght@400;700&display=swap');

        :root {
            --primary: #ff0055;
            --secondary: #00ffcc;
            --dark: #0a0a0a;
            --overlay: rgba(0, 0, 0, 0.85);
        }

        body {
            font-family: 'Hind Siliguri', sans-serif;
            background: #050505;
            color: white;
            margin: 0;
            overflow-x: hidden;
        }

        .container { max-width: 600px; margin: 40px auto; padding: 20px; }

        /* --- Payment Verification Box --- */
        #payment-gateway {
            background: #111;
            padding: 30px;
            border-radius: 20px;
            border: 2px solid var(--primary);
            text-align: center;
            box-shadow: 0 0 30px rgba(255, 0, 85, 0.2);
        }

        .step-title { color: var(--secondary); margin-bottom: 20px; font-size: 22px; }

        .payment-info {
            background: rgba(255, 255, 255, 0.05);
            padding: 15px;
            border-radius: 10px;
            margin-bottom: 20px;
            border-left: 5px solid var(--secondary);
        }

        input {
            width: 100%;
            padding: 12px;
            margin: 10px 0;
            border-radius: 8px;
            border: 1px solid #333;
            background: #222;
            color: #fff;
            font-size: 16px;
            box-sizing: border-box;
        }

        .verify-btn {
            background: linear-gradient(45deg, var(--primary), #8000ff);
            color: white;
            border: none;
            padding: 15px 30px;
            border-radius: 50px;
            font-weight: bold;
            cursor: pointer;
            width: 100%;
            font-size: 18px;
            transition: 0.3s;
        }

        .verify-btn:hover { transform: scale(1.02); opacity: 0.9; }

        /* --- Main Registration Form (Initially Hidden) --- */
        #main-form {
            display: none; /* পুরোপুরি লুকিয়ে রাখা হয়েছে */
            background: #1a1a1a;
            padding: 30px;
            border-radius: 20px;
            border: 1px solid #333;
            animation: slideUp 0.5s ease-out;
        }

        @keyframes slideUp {
            from { opacity: 0; transform: translateY(50px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .error-text {
            color: #ff4444;
            font-size: 14px;
            display: none;
            margin-bottom: 10px;
        }

        .success-screen {
            display: none;
            text-align: center;
            padding: 50px;
        }
    </style>
</head>
<body>

<div class="container">
    
    <div id="payment-gateway">
        <h2 class="step-title">পেমেন্ট ভেরিফিকেশন</h2>
        <p>রেজিস্ট্রেশন ফরমটি এক্সেস করতে ১০০০ টাকা পেমেন্ট সম্পন্ন করুন।</p>
        
        <div class="payment-info">
            <strong>বিকাশ/নগদ (Send Money):</strong><br>
            <span style="font-size: 20px; color: var(--secondary);">01757331663</span>
        </div>

        <div style="text-align: left;">
            <label>যে নম্বর থেকে টাকা পাঠিয়েছেন (১১ ডিজিট)</label>
            <input type="tel" id="senderNum" placeholder="01XXXXXXXXX" maxlength="11">
            
            <label>ট্রানজেকশন আইডি (TrxID)</label>
            <input type="text" id="trxID" placeholder="যেমন: 8N77XPS2" maxlength="12">
        </div>

        <p id="payment-error" class="error-text">ভুল তথ্য! সঠিক নম্বর এবং TrxID দিন।</p>
        
        <button class="verify-btn" onclick="checkPayment()">পেমেন্ট যাচাই করে ফরমটি খুলুন</button>
    </div>

    <div id="main-form">
        <h2 style="color: var(--secondary); text-align: center;">রেজিস্ট্রেশন ফরম</h2>
        <hr style="border: 0.5px solid #333; margin-bottom: 20px;">
        
        <form id="finalRegForm">
            <label>আপনার নাম</label>
            <input type="text" required>

            <label>বর্তমান ঠিকানা</label>
            <input type="text" required>

            <label>পছন্দের গানের ধরন</label>
            <select style="width:100%; padding:12px; background:#222; color:white; border-radius:8px; border:1px solid #333;">
                <option>লোকগীতি</option>
                <option>আধুনিক</option>
                <option>ইসলামিক</option>
            </select>

            <br><br>
            <button type="submit" class="verify-btn">আবেদন জমা দিন</button>
        </form>
    </div>

    <div id="success-screen" class="success-screen">
        <h1 style="color: var(--secondary);">ধন্যবাদ!</h1>
        <p>আপনার রেজিস্ট্রেশন এবং পেমেন্ট সফলভাবে গ্রহণ করা হয়েছে।</p>
    </div>

</div>

<script>
    function checkPayment() {
        const num = document.getElementById('senderNum').value;
        const trx = document.getElementById('trxID').value;
        const error = document.getElementById('payment-error');
        const gateway = document.getElementById('payment-gateway');
        const mainForm = document.getElementById('main-form');

        // পেমেন্ট লজিক: নম্বর অবশ্যই ১১ ডিজিট হতে হবে এবং TrxID কমপক্ষে ৭ অক্ষরের হতে হবে
        if (num.length === 11 && trx.length >= 7) {
            
            // এখানে আপনি চাইলে নির্দিষ্ট কোনো TrxID প্যাটার্ন চেক করতে পারেন
            // বর্তমানে এটি সঠিক ফরম্যাট পেলেই ফরম ওপেন করবে
            
            error.style.display = 'none';
            gateway.style.display = 'none'; // পেমেন্ট বক্স ভ্যানিশ হয়ে যাবে
            mainForm.style.display = 'block'; // মেইন ফরম স্লাইড করে আসবে
            
            window.scrollTo(0, 0);
        } else {
            error.style.display = 'block';
            document.getElementById('payment-gateway').style.borderColor = 'red';
        }
    }

    document.getElementById('finalRegForm').addEventListener('submit', function(e) {
        e.preventDefault();
        document.getElementById('main-form').style.display = 'none';
        document.getElementById('success-screen').style.display = 'block';
    });
</script>

</body>
</html>
